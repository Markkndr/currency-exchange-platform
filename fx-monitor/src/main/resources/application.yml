spring:
  application:
    name: currency-exchange-platform

  datasource:
    url: jdbc:h2:file:${user.home}/.fx-monitor/data/fxmonitor;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  cache:
    type: simple

  security:
    jwt:
      secret: your-super-secret-jwt-key-make-it-long-and-secure-at-least-256-bits-this-is-important
      expiration: 900000 # 15-minute Access Token
      refresh-expiration: 604800000 # 7-day Refresh Token

server:
  port: 8080
  servlet:
    context-path: /api

# Forex API Configuration
forex:
  api:
    url: https://api.exchangerate-api.com/v4/latest
    key: your-api-key-here
    update-interval: 3600 # 1 hour
    timeout: 5000

# Platform Fee Configuration
platform:
  fees:
    exchange-percentage: 0.5
    transfer-percentage: 0.1
    withdrawal-percentage: 0.2
    min-exchange-amount: 1.00
    max-daily-exchange: 10000.00

logging:
  level:
    com.currencyexchange: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"